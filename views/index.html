<!DOCTYPE html>
<html>
<head>
  <title>Product CRUD</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #667eea; color: white; }
    input, select { padding: 8px; margin: 5px; }
    button { padding: 8px 15px; cursor: pointer; background: #667eea; color: white; border: none; }
    .btn-delete { background: #dc3545; }
    .btn-edit { background: #ffc107; }
  </style>
</head>
<body>
  <h1>Product CRUD</h1>
  
  <h2>Add/Edit Product</h2>
  <form id="productForm">
    <input type="hidden" id="productId">
    <input type="text" id="name" placeholder="Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="text" id="phone" placeholder="Phone" required>
    <input type="text" id="image" placeholder="Image URL">
    <select id="status">
      <option value="true">Active</option>
      <option value="false">Inactive</option>
    </select>
    <button type="submit" id="submitBtn">Add</button>
    <button type="button" onclick="resetForm()">Reset</button>
  </form>

  <h2>Search & Pagination</h2>
  <input type="text" id="search" placeholder="Search by name">
  <select id="limit">
    <option value="5">5</option>
    <option value="10">10</option>
    <option value="15">15</option>
  </select>
  <button onclick="loadProducts()">Search</button>

  <h2>Products</h2>
  <div id="bulkActions" style="display:none">
    <input type="checkbox" id="selectAll"> Select All
    <button class="btn-delete" onclick="bulkDelete()">Delete Selected</button>
  </div>
  <table>
    <thead>
      <tr>
        <th></th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Image</th>
        <th>Status</th>
        <th>Created</th>
        <th>Updated</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  
  <div>
    <button onclick="changePage(-1)">Previous</button>
    <span id="pageInfo"></span>
    <button onclick="changePage(1)">Next</button>
  </div>

  <script>
const API_URL = 'http://localhost:3000/api';
    let currentPage = 1;
    let currentLimit = 5;

    async function loadProducts() {
      const search = document.getElementById('search').value;
      const limit = document.getElementById('limit').value;
      currentLimit = limit;
      
      const res = await fetch(`${API_URL}/products?page=${currentPage}&limit=${limit}&search=${search}`);
      const data = await res.json();
      
      if (data.success) {
        renderTable(data.products);
        document.getElementById('pageInfo').innerText = `Page ${data.page} of ${data.totalPages}`;
      }
    }

    function renderTable(products) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = products.map(p => `
        <tr>
          <td><input type="checkbox" class="row-checkbox" value="${p._id}"></td>
          <td>${p.name}</td>
          <td>${p.email}</td>
          <td>${p.phone}</td>
          <td>${p.image ? '<img src="' + p.image + '" width="50">' : ''}</td>
          <td>${p.status ? 'Active' : 'Inactive'}</td>
          <td>${p.created_date}</td>
          <td>${p.updated_date}</td>
          <td>
            <button class="btn-edit" onclick="editProduct('${p._id}')">Edit</button>
            <button class="btn-delete" onclick="deleteProduct('${p._id}')">Delete</button>
          </td>
        </tr>
      `).join('');
    }

    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('productId').value;
      const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        image: document.getElementById('image').value,
        status: document.getElementById('status').value === 'true'
      };

      if (id) {
        await fetch(`${API_URL}/products/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
      } else {
        await fetch(`${API_URL}/products`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
      }
      resetForm();
      loadProducts();
    });

    async function editProduct(id) {
      const res = await fetch(`${API_URL}/products/${id}`);
      const data = await res.json();
      if (data.success) {
        const p = data.product;
        document.getElementById('productId').value = p._id;
        document.getElementById('name').value = p.name;
        document.getElementById('email').value = p.email;
        document.getElementById('phone').value = p.phone;
        document.getElementById('image').value = p.image || '';
        document.getElementById('status').value = p.status.toString();
        document.getElementById('submitBtn').innerText = 'Update';
      }
    }

    async function deleteProduct(id) {
      if (confirm('Delete this product?')) {
        await fetch(`${API_URL}/products/${id}`, { method: 'DELETE' });
        loadProducts();
      }
    }

    function resetForm() {
      document.getElementById('productForm').reset();
      document.getElementById('productId').value = '';
      document.getElementById('submitBtn').innerText = 'Add';
    }

    function changePage(delta) {
      currentPage += delta;
      if (currentPage < 1) currentPage = 1;
      loadProducts();
    }

    document.getElementById('selectAll').addEventListener('change', (e) => {
      document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = e.target.checked);
      document.getElementById('bulkActions').style.display = e.target.checked ? 'block' : 'none';
    });

    async function bulkDelete() {
      const ids = Array.from(document.querySelectorAll('.row-checkbox:checked')).map(cb => cb.value);
      if (ids.length > 0 && confirm(`Delete ${ids.length} products?`)) {
        await fetch(`${API_URL}/products/bulk-delete`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ids })
        });
        loadProducts();
      }
    }

    loadProducts();
  </script>
</body>
</html>
