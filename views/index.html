<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product CRUD</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container">
    <h1>Product CRUD</h1>
    
    <section class="section">
      <h2>Add/Edit Product</h2>
      <form id="productForm">
        <input type="hidden" id="productId">
        <input type="text" id="name" placeholder="Name" required>
        <input type="text" id="email" placeholder="Email">
        <input type="text" id="phone" placeholder="Phone" required>
        <input type="text" id="image" placeholder="Image URL">
        <select id="status">
          <option value="true">Active</option>
          <option value="false">Inactive</option>
        </select>
        <div style="grid-column: 1 / -1;">
          <button type="submit" id="submitBtn" class="btn-submit">Add Product</button>
          <button type="button" class="btn-reset" onclick="resetForm()">Reset</button>
        </div>
      </form>
    </section>

    <section class="section">
      <h2>Search & Controls</h2>
      <div class="search-controls">
        <input type="text" id="search" placeholder="Search by name">
        <select id="limit">
          <option value="5">5 per page</option>
          <option value="10">10 per page</option>
          <option value="15">15 per page</option>
        </select>
        <button class="btn-search" onclick="loadProducts()">Search</button>
      </div>
    </section>

    <section class="section">
      <h2>Products</h2>
      <div id="bulkActions">
        <label><input type="checkbox" id="selectAll"> Select All</label>
        <button class="btn-delete" onclick="bulkDelete()">Delete Selected</button>
      </div>
      
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th><input type="checkbox" id="selectAllHeader" style="margin:0;"></th>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Image</th>
              <th>Status</th>
              <th>Created</th>
              <th>Updated</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      
      <div class="pagination">
        <button onclick="changePage(-1)">Previous</button>
        <span id="pageInfo"></span>
        <button onclick="changePage(1)">Next</button>
      </div>
    </section>
  </div>

<script src="/script.js"></script>
</body>
</html>
